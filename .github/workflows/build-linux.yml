name: Build Linux

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libcurl4-openssl-dev \
            nlohmann-json3-dev \
            qtbase5-dev \
            qtdeclarative5-dev \
            qtpositioning5-dev \
            qtlocation5-dev \
            qtquickcontrols2-5-dev \
            libgl1-mesa-dev \
            libxcb-xinerama0

      - name: Configure and Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: flood_monitor-linux
          path: build/flood_monitor